<button routerLink="/products">Volver a productos</button>

<h2>Mis Órdenes</h2>

<div *ngIf="loading">Cargando...</div>

<div *ngIf="!loading && orders.length === 0">
  <p>No tienes órdenes aún</p>
</div>

<div *ngFor="let order of orders" style="border: 1px solid #ccc; margin: 10px; padding: 10px">
  <h3>Orden #{{ order.id }}</h3>
  <p>Total: ${{ order.totalAmount }}</p>
  <p>Fecha: {{ order.createdAt }}</p>

  <div *ngFor="let item of order.orderItems">
    <p>{{ item.product?.name }} - Cantidad: {{ item.quantity }} - Precio: {{ item.price }}</p>
  </div>
</div>
